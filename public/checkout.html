<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Payment - Quick Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 420px; padding: 32px 24px; margin: 20px; }
        h2 { text-align: center; color: #0f172a; margin-bottom: 4px; }
        .sub { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .wallet-info { background: #f1f5f9; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #475569; text-align: center; word-break: break-all; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #334155; margin-bottom: 6px; font-size: 14px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; background: #f8fafc; transition: 0.2s; }
        input:focus { outline: none; border-color: #3b82f6; background: white; }
        .btn { background: #3b82f6; color: white; border: none; padding: 14px; font-size: 17px; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: none; text-align: center; padding: 16px 0; }
        .spinner { width: 32px; height: 32px; border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>💳 Pay with Card</h2>
        <p class="sub">Receive USDT on Polygon instantly</p>
        <div class="wallet-info">
            Receiving wallet:<br><strong>0xA328...bB198d</strong>
        </div>
        <div class="form-group">
            <label for="amount">Amount (USD)</label>
            <input type="number" id="amount" placeholder="e.g. 20" min="1" step="any">
        </div>
        <button id="pay-button" class="btn">Pay with Card</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Creating secure session...</p>
        </div>
    </div>

    <script src="https://cdn.crossmint.io/sdk/v2/crossmint-sdk.js"></script>
    <script>
        // Staging Client ID (بغیر KYC)
        const CROSSMINT_CLIENT_ID = "ck_staging_9uRpnyN3UUZqBgvHFyiTKy1sQghwqUgfk5VjwT4AwX7St9iRefTA9sZU4EosZLgtQribk9Cz4Ukj3Yk4VhnvwBf58s2sZ5s88NX2SxmNffQyh8X68QBdohNdJGYo4W8ustSrxNhxY5R7KBChQQEM3yeMvAXvY5nbLn4iD8fbgQGnMKq369ZbJmCMYUApYd9dLkph6eAHeE2Aw1Gozhj3sMqB";

        // آپ کا والٹ ایڈریس (Polygon USDT)
        const RECIPIENT_WALLET = "0xA328F1903840946B573947D4D311Fd7AF1bB198d";

        const payButton = document.getElementById("pay-button");
        const amountInput = document.getElementById("amount");
        const loadingDiv = document.getElementById("loading");

        payButton.addEventListener("click", async () => {
            const amount = parseFloat(amountInput.value);
            if (!amount || amount <= 0) return alert("Enter a valid amount.");
            payButton.disabled = true;
            loadingDiv.style.display = "block";
            try {
                const payment = await window.crossmint.createPayment({
                    clientId: CROSSMINT_CLIENT_ID,
                    amount: amount,
                    currency: "usdt",
                    network: "polygon",
                    recipient: { walletAddress: RECIPIENT_WALLET },
                }
