<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Payment Gateway - Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; line-height: 1.6; }
        .container { max-width: 500px; margin: 60px auto; padding: 20px; }
        .checkout-card { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .card-header h2 { font-size: 1.8rem; margin-bottom: 5px; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 28px; font-size: 18px; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f4f6; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-card">
            <div class="card-header">
                <h2>Secure Checkout</h2>
                <p>Pay with card, receive crypto</p>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="amount">Amount (USD)</label>
                    <input type="number" id="amount" placeholder="e.g. 20" min="1" step="any">
                </div>
                <div class="form-group">
                    <label for="network">Network</label>
                    <select id="network">
                        <option value="polygon">Polygon (USDC)</option>
                        <option value="ethereum">Ethereum (USDC)</option>
                        <option value="solana">Solana (USDC)</option>
                    </select>
                </div>
                <button id="pay-button" class="btn">Pay with Card</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Creating payment session...</p>
                </div>
            </div>
        </div>
    </div>
